<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinterest Clone</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      background: white;
      position: sticky;
      top: 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    header h1 {
      color: #e60023;
      margin-right: 20px;
    }

    .search {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #eee;
    }

    .grid {
      column-count: 4;
      column-gap: 15px;
      padding: 15px;
    }

    .card {
      background: white;
      margin-bottom: 15px;
      border-radius: 15px;
      overflow: hidden;
      display: inline-block;
      width: 100%;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .card p {
      padding: 10px;
      font-weight: bold;
    }

    @media(max-width: 900px) {
      .grid { column-count: 2; }
    }

    @media(max-width: 500px) {
      .grid { column-count: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>Pinsta</h1>
  <input type="text" class="search" placeholder="Search images..." id="searchInput">
</header>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');

let images = [
  {url: 'https://source.unsplash.com/random/400x600?nature', title: 'Nature'},
  {url: 'https://source.unsplash.com/random/400x500?car', title: 'Cars'},
  {url: 'https://source.unsplash.com/random/400x700?food', title: 'Food'},
  {url: 'https://source.unsplash.com/random/400x550?technology', title: 'Tech'},
  {url: 'https://source.unsplash.com/random/400x650?fashion', title: 'Fashion'},
  {url: 'https://source.unsplash.com/random/400x600?travel', title: 'Travel'},
  {url: 'https://source.unsplash.com/random/400x500?anime', title: 'Anime'},
  {url: 'https://source.unsplash.com/random/400x700?gaming', title: 'Gaming'}
];

function displayImages(data) {
  grid.innerHTML = '';
  data.forEach(img => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <img src="${img.url}" />
      <p>${img.title}</p>
    `;

    grid.appendChild(card);
  });
}

displayImages(images);

searchInput.addEventListener('input', () => {
  const value = searchInput.value.toLowerCase();
  const filtered = images.filter(img => img.title.toLowerCase().includes(value));
  displayImages(filtered);
});
</script>

</body>
</html>
